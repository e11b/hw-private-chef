name: Fetch Google Reviews

on:
  schedule:
    # Run every 30 days (1st of each month at 8 AM UTC)
    - cron: '0 8 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews from SearchAPI
        env:
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
        run: node fetch-reviews.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --cached --quiet || (git commit -m "Update reviews $(date -u +%Y-%m-%d)" && git push)
